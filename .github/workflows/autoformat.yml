name: Autoformat
on:
  schedule:
    - cron: "0 3 * * *" # Every night at 3:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autoformat:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update SwiftFormat
        run: brew upgrade swiftformat || true
      - name: Run SwiftFormat
        run: |
          swiftformat --version > .swiftformat-version
          swiftformat .
      - name: Create PR if needed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Apply SwiftFormat updates"
          title: "Apply SwiftFormat updates"
          body: Automated formatting by SwiftFormat.
          branch: autoformat/swiftformat
          delete-branch: true
